<script>
/* Dark mode toggle - preference stored per device */
function goToCalendar() {
    // Remember the week and day on screen so returning restores them
    // (same mechanism as the Full Week View button)
    if (window.__currentWeek) sessionStorage.setItem("viewerWeek", window.__currentWeek);
    sessionStorage.setItem("viewerDay", window.selectedDay || "Monday");
    location.href = "calendar.html";
}
     function toggleTheme() {
    const dark = document.documentElement.dataset.theme === "dark";
    if (dark) {
        delete document.documentElement.dataset.theme;
        localStorage.removeItem("theme");
    } else {
        document.documentElement.dataset.theme = "dark";
        localStorage.setItem("theme", "dark");
    }
}
</script>
<script src="app.js"></script>
<script>
document.getElementById("appVersion").textContent =
   `Cardiac Theatre Dashboard v${window.APP_VERSION}`;
</script>
    <script>
if ("serviceWorker" in navigator) {
    // When a new service worker takes control, reload once automatically
    // so the page is never shown in a half-updated state (which briefly
    // left the week box saying "Loading" after a version change).
    let __reloadedForUpdate = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (__reloadedForUpdate) return;
        __reloadedForUpdate = true;
        window.location.reload();
    });


    window.addEventListener("load", async () => {

        try {

           const registration =
    await navigator.serviceWorker.register("./service-worker.js");

// Force the browser to check for a newer service worker
await registration.update();
            function checkForWaitingWorker() {

                if (registration.waiting) {

                    if (window.UpdateUI) {
                        UpdateUI.show();
                    }

                }

            }

            checkForWaitingWorker();

            registration.addEventListener("updatefound", () => {

                const newWorker = registration.installing;

                if (!newWorker) return;

                newWorker.addEventListener("statechange", () => {

                    if (
                        newWorker.state === "installed" &&
                        navigator.serviceWorker.controller
                    ) {

                        checkForWaitingWorker();

                    }

                });

            });

        } catch (err) {

            console.error("Service Worker registration failed:", err);

        }

    });

}
</script>
